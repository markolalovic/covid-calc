<ul class="nav nav-tabs main-tabs" role="tablist">
  {% for tab in site.data.tabs %}
    <li
      id="nav-{{ tab.section }}"
      role="presentation"
      class="{% if forloop.first %}active{% endif %}"
    >
      <a
        href="#{{ tab.section }}"
        aria-controls="{{ tab.section }}"
        role="tab"
        data-toggle="tab"
      >
        {{ tab.title }}
      </a>
    </li>
  {% endfor %}

  <li class="pull-right">
    <a href="#" role="tab">
      <span class="logo-text">Covid Calculator</span>
    </a>
  </li>
</ul>
